<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouCast NOW - Header</title>
    <link rel="stylesheet" href="css/estilo.css">
</head>
<body>

    <header class="main-header">
        <div class="logo-side">
            <img src="img/Logo_You_Cast.svg (1).svg" alt="YouCast NOW Logo" class="logo">
        </div>

        <div class="actions-side">
            <nav>
                <button class="btn btn-focus">STREAMING</button>
                <button class="btn btn-active">DISCOVER</button>
                <button class="btn btn-primary">CAST NOW</button>
            </nav>

            <div class="user-profile">
                <img src="img/Avatar_do_Usuário.png" alt="Foto do Usuário" class="avatar">
            </div>
        </div>
    </header>

</body>
</html>
